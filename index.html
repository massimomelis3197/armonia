<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiet — Focus &amp; Natura</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Backgrounds -->
<div class="bg-layer bg-a" id="bgA"><div class="bg-layer-inner"></div></div>
<div class="bg-layer bg-b" id="bgB"><div class="bg-layer-inner"></div></div>
<div class="bg-overlay"></div>
<canvas class="bg-particles" id="bgParticles"></canvas>
<div class="bg-noise"></div>

<!-- ============ SCHERMATA INIZIALE ============ -->
<div class="intro-screen" id="introScreen">
  <div class="intro-content">
    <h1 class="intro-h1">Benvenuto ad Armony</h1>
    <h2 class="intro-h2">Scegli il tuo suono preferito</h2>
    <div class="intro-sounds" id="introSounds"></div>
  </div>
</div>

<div class="app">

  <div class="brand">
    Quiet
    <button class="settings-gear" id="settingsGearBtn" aria-label="Scegli suono">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </button>
  </div>

  <button class="clear-widgets-btn" id="clearWidgetsBtn" aria-label="Rimuovi tutti i widget">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 7h16"/>
      <path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/>
      <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/>
      <path d="M10 11v6M14 11v6"/>
    </svg>
  </button>
  <div class="sound-panel glass" id="soundPanel">
    <div class="sound-panel-title">Suoni</div>
    <div class="sound-panel-list" id="soundPanelList"></div>
  </div>

  <!-- ============ PAGE DOTS (solo smartphone, sinistra/centro/destra) ============ -->
  <div class="page-dots" id="pageDots">
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
  </div>

  <!-- ============ PLAYER ============ -->
  <div class="player-wrap">
    <div class="player glass">
      <div class="player-top">
        <div class="player-scene-icon" id="sceneIcon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <div class="player-info">
          <div class="player-title" id="sceneTitle">Pioggia</div>
        </div>
        <div class="player-controls-inline">
          <button class="ctrl-btn play" id="playBtn" aria-label="Play/Pausa">
            <span id="playIconWrap"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
          </button>
          <button class="ctrl-btn small repeat" id="repeatBtn" title="Ripeti" aria-label="Ripeti">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            <!-- Badge "1" visibile solo quando il loop è attivo (vedi .ctrl-btn.repeat.active .repeat-badge in CSS) -->
            <span class="repeat-badge" id="repeatBadge">1</span>
          </button>
        </div>
      </div>

      <div class="duration-row">
        <div class="duration-labels">
          <span class="duration-value" id="durationValue">00:00</span>
          <span>180 min</span>
        </div>
        <!-- Barra di sola visualizzazione: avanza automaticamente con la riproduzione
             fino al tetto massimo di 180 min per ogni suono. Non più trascinabile. -->
        <!-- Barra interattiva: avanza da sola con la riproduzione ma può anche
             essere trascinata (manovella tonda) per saltare avanti/indietro
             nella sessione fino al tetto di 180 min. -->
        <div class="slider-track" id="sliderTrack">
          <div class="slider-fill" id="sliderFill"></div>
          <div class="slider-handle" id="sliderHandle" tabindex="0" role="slider"
               aria-valuemin="0" aria-valuemax="10800" aria-valuenow="0"
               aria-label="Posizione nella sessione"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ DOCK (sempre attiva) ============ -->
  <div class="dock-wrap">
    <div class="dock glass">
      <button class="dock-btn" data-widget="clock" aria-label="Orologio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        <span class="label">Orologio</span>
      </button>
      <button class="dock-btn" data-widget="calendar" aria-label="Calendario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
        <span class="label">Calendario</span>
      </button>
      <div class="dock-divider"></div>
      <button class="dock-btn" data-widget="tools" aria-label="Strumenti tempo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M4 4l3 3M20 4l-3 3"/></svg>
        <span class="label">Strumenti</span>
      </button>
      <div class="dock-divider"></div>
      <button class="dock-btn" data-widget="noteslist" aria-label="Note ed Elenco">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5M8 13h8M8 17h5"/></svg>
        <span class="label">Note</span>
      </button>
    </div>
  </div>

  <!-- ============ WIDGET: CALENDAR ============ -->
  <div class="widget glass" id="widget-calendar">
    <div class="widget-head">
      <div class="widget-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
        Calendario
      </div>
      <button class="widget-close" data-close="calendar">✕</button>
    </div>
    <div class="widget-body">
      <div class="cal-head">
        <button class="cal-nav" id="calPrev">‹</button>
        <div class="cal-month" id="calMonth">Luglio 2026</div>
        <button class="cal-nav" id="calNext">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- ============ WIDGET: CLOCK (nessun vetro, grande, non eliminabile) ============ -->
  <div class="widget" id="widget-clock">
    <div class="clock-big" id="clockTime">00:00</div>
    <div class="clock-date-big" id="clockDate">—</div>
  </div>

  <!-- ============ WIDGET: STRUMENTI TEMPO (Sveglia / Cronometro / Timer) ============ -->
  <div class="widget glass" id="widget-tools">
    <div class="widget-head">
      <div class="widget-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M4 4l3 3M20 4l-3 3"/></svg>
        <span id="toolsLabel">Sveglia</span>
      </div>
      <button class="widget-close" data-close="tools">✕</button>
    </div>
    <div class="widget-body">
      <div class="widget-subnav">
        <button class="subnav-arrow" id="toolsPrev" aria-label="Strumento precedente">‹</button>
        <div class="subnav-dots" id="toolsDots">
          <div class="subnav-dot"></div>
          <div class="subnav-dot"></div>
          <div class="subnav-dot"></div>
        </div>
        <button class="subnav-arrow" id="toolsNext" aria-label="Strumento successivo">›</button>
      </div>

      <div class="subnav-view" data-view="alarm">
        <input type="time" class="alarm-time-big" id="alarmTimeInput" value="07:00">
        <div class="sw-buttons">
          <button class="sw-btn primary" id="alarmStartBtn">Avvia</button>
          <button class="sw-btn" id="alarmClearBtn">Cancella</button>
        </div>
        <div class="alarm-status" id="alarmStatus">Nessuna sveglia impostata</div>
      </div>

      <div class="subnav-view" data-view="stopwatch">
        <div class="sw-list" id="swList"></div>
      </div>

      <div class="subnav-view" data-view="timer">
        <div class="sw-time" id="timerDisplay">05:00</div>
        <div class="timer-nudge-track" id="timerNudgeTrack">
          <div class="timer-nudge-center"></div>
          <div class="timer-nudge-fill" id="timerNudgeFill"></div>
          <div class="timer-nudge-handle" id="timerNudgeHandle" tabindex="0" role="slider"
               aria-valuemin="-10" aria-valuemax="10" aria-valuenow="0"
               aria-label="Trascina per aggiungere o togliere minuti al timer"></div>
        </div>
        <div class="timer-nudge-labels"><span>−10 min</span><span>+10 min</span></div>
        <div class="sw-buttons">
          <button class="sw-btn primary" id="timerStartBtn">Avvia</button>
          <button class="sw-btn" id="timerResetBtn">Azzera</button>
        </div>
        <div class="alarm-status" id="timerStatus">Pronto</div>
      </div>
    </div>
  </div>

  <!-- ============ WIDGET: NOTE / ELENCO ============ -->
  <div class="widget glass" id="widget-noteslist">
    <div class="widget-head">
      <div class="widget-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5M8 13h8M8 17h5"/></svg>
        <span id="noteslistLabel">Note</span>
      </div>
      <button class="widget-close" data-close="noteslist">✕</button>
    </div>
    <div class="widget-body">
      <div class="widget-subnav">
        <button class="subnav-arrow" id="noteslistPrev" aria-label="Vista precedente">‹</button>
        <div class="subnav-dots" id="noteslistDots">
          <div class="subnav-dot"></div>
          <div class="subnav-dot"></div>
        </div>
        <button class="subnav-arrow" id="noteslistNext" aria-label="Vista successiva">›</button>
      </div>

      <div class="subnav-view" data-view="notes">
        <div class="notes-add">
          <textarea id="noteInput" placeholder="Scrivi una nota…"></textarea>
          <button class="notes-save" id="noteSaveBtn" aria-label="Salva nota">＋</button>
        </div>
        <div class="notes-list" id="notesList"></div>
      </div>

      <div class="subnav-view" data-view="list">
        <div class="notes-add">
          <input type="text" id="listInput" class="list-input" placeholder="Aggiungi voce…">
          <button class="notes-save" id="listSaveBtn" aria-label="Aggiungi voce">＋</button>
        </div>
        <div class="list-items" id="listItems"></div>
      </div>
    </div>
  </div>

</div>

<!-- Indicatore discreto di salvataggio automatico -->
<div class="autosave-badge" id="autosaveBadge">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
  <span>Salvato</span>
</div>

<!-- Audio element per il player -->
<audio id="audioPlayer" preload="none"></audio>

<script src="script.js"></script>
</body>
</html>
